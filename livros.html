<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Livros BiblioTech</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pagina">

        <div class="card grande">

            <h1>Escolha um Livro</h1>

            <p id="usuarioLogado"></p>

            <div class="busca-container">

                <input
                    type="text"
                    id="buscaLivro"
                    placeholder="Digite o nome do livro"
                >

                <button onclick="buscarLivros()">
                    Buscar
                </button>

            </div>

            <div id="resultadoLivros"></div>

        </div>

    </div>

    <script src="js/livro.js"></script>

    <script>
        const usuario =
            JSON.parse(
                sessionStorage.getItem("usuarioLogado")
            );

        if (usuario) {

            document.getElementById(
                "usuarioLogado"
            ).innerHTML =
                `Bem-vindo, <strong>${usuario.nome}</strong>`;
        }

        function sair() {

            sessionStorage.removeItem(
                "usuarioLogado"
            );

            window.location.href =
                "index.html";
        }
    </script>

</body>
</html>
