<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro BiblioTech</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pagina">

        <div class="card">

            <h1>Cadastrar Cliente</h1>

            <input
                type="text"
                id="nome"
                placeholder="Nome completo"
            >

            <input
                type="text"
                id="cpf"
                placeholder="CPF"
            >

            <input
                type="email"
                id="email"
                placeholder="E-mail"
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
            >

            <button onclick="cadastrarCliente()">
                Cadastrar
            </button>

 <div class="cadastro-link">
                Já possui uma conta? <br><br>
                <a href="index.html">
                    Fazer Login
                </a>
            </div>

        </div>

    </div>

    <script src="js/cliente.js"></script>

</body>
</html>
